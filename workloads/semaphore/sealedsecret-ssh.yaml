# Story 5.7 — STUB. The TWO existing SSH keys Semaphore uses: openwrt = root@10.0.0.1 (OpenWrt),
# oracle = ubuntu@Oracle. 🔴 root@10.0.0.1 is a HIGH-blast-radius credential (Plane 0 gateway). Sealed
# LIVE by the operator against the live controller (ns sealed-secrets — see memory
# kubeseal-controller-ns), Task 1b — easiest via ./seal-secrets.sh. Until then this file stays OUT of
# kustomization.yaml resources: (the pod is CreateContainerConfigError without it).
#
# Regenerate (operator, real keys on disk):
#   kubectl create secret generic semaphore-ssh -n semaphore \
#     --from-file=openwrt=~/.ssh/id_ed25519 --from-file=oracle=~/.ssh/oracle_proxy \
#     --dry-run=client -o yaml | kubeseal --controller-namespace sealed-secrets --format yaml
# Then overwrite this file, uncomment the resource line in kustomization.yaml, commit.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: semaphore-ssh
  namespace: semaphore
spec:
  encryptedData:
    openwrt: PLACEHOLDER_SEAL_ME      # operator replaces with sealed ciphertext (Task 1b)
    oracle: PLACEHOLDER_SEAL_ME
  template:
    metadata:
      name: semaphore-ssh
      namespace: semaphore
