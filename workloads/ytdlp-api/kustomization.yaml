apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
# No ingressroute.yaml: internal-only (Reconciliation 1). No backup-cronjob.yaml: stateless,
# owns no data (AC2). No SealedSecret: config.yml holds no secrets/hosts.

# config.yml -> ytdlp-api-config ConfigMap, mounted at /app_config/config.yml.
# disableNameSuffixHash so the Deployment can reference the stable name `ytdlp-api-config`.
configMapGenerator:
  - name: ytdlp-api-config
    files:
      - config.yml
generatorOptions:
  disableNameSuffixHash: true

# Use `labels:` (newer field), NEVER commonLabels (pollutes selectors -> immutable conflict)
# and NEVER namePrefix (breaks the name+ns binding). includeSelectors: false keeps these out of
# spec.selector / matchLabels (hand-written in deployment.yaml).
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: ytdlp-api
      app.kubernetes.io/instance: ytdlp-api
      app.kubernetes.io/part-of: ytdlp-api
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: app
