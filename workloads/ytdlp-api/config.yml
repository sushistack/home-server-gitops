ydl_server:
  port: 8080
  host: 0.0.0.0
  debug: False
  metadata_db_path: '/downloads/.ydl-metadata.db'
  max_log_entries: 100
  default_format: bestaudio/best
  download_workers_count: 2

ydl_options:
  output: '/downloads/%(uploader)s/%(title)s [%(id)s].%(ext)s'
  cache-dir: '/downloads/.cache'
  ignore-errors: True

profiles:
  lastfm-discovery:
    name: 'Last.fm Discovery'
    ydl_options:
      output: '/downloads/lastfm-discovery/%(uploader)s - %(title)s.%(ext)s'
      format: bestaudio/best
      extract-audio: True
      audio-format: mp3
      audio-quality: 0
      embed-metadata: True
      embed-thumbnail: True
      no-overwrites: True
      match-filter: 'duration < 600'
      parse-metadata: 'uploader:%(album)s'
