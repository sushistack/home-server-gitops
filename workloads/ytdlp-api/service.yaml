# Internal-only (Reconciliation 1, Operator-confirmed 2026-06-18): ClusterIP, NO IngressRoute.
# Consumed in-cluster by FQDN (ytdlp-api.ytdlp-api.svc.cluster.local:8080). n8n is the only
# caller and stays on Compose until Epic 4 — the FR11/FR12 external public host is N/A here.
apiVersion: v1
kind: Service
metadata:
  name: ytdlp-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ytdlp-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
