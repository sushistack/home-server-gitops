# Story 4.3 — navidrome ClusterIP. Public exposure is via the Traefik IngressRoute
# (ingressroute.yaml), not a host port (Compose bound a loopback-only host port behind NPM).
apiVersion: v1
kind: Service
metadata:
  name: navidrome
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: navidrome
  ports:
    - name: http
      port: 4533
      targetPort: 4533
