# Story 4.3 — Last.fm scrobble credentials for navidrome (ND_LASTFM_APIKEY + ND_LASTFM_SECRET),
# consumed via `envFrom: secretRef` in deployment.yaml (NOT per-key valueFrom — avoids the
# empty-string overwrite trap). Sealed to name+ns (navidrome-lastfm/navidrome) — safe to commit.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: navidrome-lastfm
  namespace: navidrome
spec:
  encryptedData:
    ND_LASTFM_APIKEY: 
    ND_LASTFM_SECRET: 
  template:
    metadata:
      name: navidrome-lastfm
      namespace: navidrome
