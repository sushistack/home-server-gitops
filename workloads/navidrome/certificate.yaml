# Story 4.3 — per-host production TLS for navidrome. cert-manager issues a browser-trusted cert for
# the single host ${SECRET:DOMAIN_NAVIDROME} from the PRODUCTION DNS-01 ClusterIssuer
# (letsencrypt-prod, Story 2.4) into the `navidrome-tls` Secret in THIS namespace, served by the
# websecure IngressRoute. Per-host (not excalidraw's shared wildcard) — self-contained, GitOps-native,
# no cross-ns secret sharing, no LE duplicate-cert burn on rebuild. The copyable Epic 4 pattern.
# Renewal is automatic (cert-manager renewBefore ~2/3 of the 90-day LE leaf).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: navidrome-tls
spec:
  secretName: navidrome-tls
  dnsNames:
    - "${SECRET:DOMAIN_NAVIDROME}"   # single public host (tokenized); music.<public-zone>
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
