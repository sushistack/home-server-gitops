# Story 4.3 — per-namespace R2 credential for the navidrome-backup CronJob (rclone "r2" remote).
# Sealed to name+ns (navidrome-backup-r2/navidrome) — safe to commit; only this cluster decrypts it.
# Same bucket-scoped token as the other k3s service backups (internal/r2-k3s.env). Regenerate via:
#   kubectl create secret generic navidrome-backup-r2 -n navidrome --from-literal=... --dry-run=client -o yaml | kubeseal --format yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: navidrome-backup-r2
  namespace: navidrome
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: 
    RCLONE_CONFIG_R2_ENDPOINT: 
    RCLONE_CONFIG_R2_PROVIDER: 
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: 
    RCLONE_CONFIG_R2_TYPE: 
  template:
    metadata:
      name: navidrome-backup-r2
      namespace: navidrome
