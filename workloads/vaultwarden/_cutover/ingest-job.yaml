# Story 4.8 — ONE-SHOT ingest Job (stateful-cutover.md Step 3). THROWAWAY scaffolding:
# NOT listed in workloads/vaultwarden/kustomization.yaml, so the ApplicationSet/ArgoCD never manages
# it (// ponytail: let ArgoCD own this and it fights you on the next sync). Apply by hand during the
# cutover, then delete.
#
# It parks a pod holding the vaultwarden-data PVC open so the operator can copy the consistent
# /data tree (from the live Compose write-freeze + sqlite3 .backup, Step 2) in, then exits:
#
#   kubectl apply -f workloads/vaultwarden/_cutover/ingest-job.yaml
#   pod=$(kubectl -n vaultwarden get pod -l job-name=vaultwarden-ingest -o name | head -1)
#   # copy the FULL frozen /data tree: db.sqlite3 (the .backup output), rsa_key.* (LOAD-BEARING),
#   # config.json, attachments/, sends/  (icon_cache/ is regenerable, skip it):
#   ssh root@<compose-host> 'tar -C /opt/docker/data/vaultwarden --exclude=icon_cache -cf - db.sqlite3 rsa_key.pem rsa_key.pub config.json attachments sends 2>/dev/null' \
#     | kubectl -n vaultwarden exec -i "${pod#pod/}" -- tar -C /data -xf -
#   # verify before the Deployment starts:
#   kubectl -n vaultwarden exec "${pod#pod/}" -- sh -c \
#     'ls -l /data && sqlite3 /data/db.sqlite3 "select count(*) from users; select count(*) from ciphers;"'
#   kubectl -n vaultwarden delete -f workloads/vaultwarden/_cutover/ingest-job.yaml
#
# Then the steady-state vaultwarden Deployment starts against the populated PVC (Step 4). RWO: this
# Job and the app pod must not hold the volume at the same time on different nodes — run ingest
# BEFORE the Deployment exists, or scale the Deployment to 0 during ingest (suspend autosync first).
apiVersion: batch/v1
kind: Job
metadata:
  name: vaultwarden-ingest
  namespace: vaultwarden
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: alpine:3.20   # needs a shell + sqlite3/tar for cp + verify; pin by digest if desired
          command:
            - /bin/sh
            - -c
            - "apk add --no-cache sqlite >/dev/null; echo 'ready for kubectl cp/exec into /data; sleeping'; sleep 3600"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
