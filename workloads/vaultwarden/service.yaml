# Story 4.8 — vaultwarden ClusterIP. Public exposure is via the Traefik IngressRoute
# (ingressroute.yaml), not a host port (Compose bound a loopback-only host port behind NPM).
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vaultwarden
  ports:
    - name: http
      port: 80
      targetPort: 80
