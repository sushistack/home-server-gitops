# Story 5.7 — Beszel HUB: lightweight node-resource monitoring (CPU/mem/disk/net + history) with a UI.
#
# 🔴 Reconciliation 3 — Beszel is the MISSING THIRD monitoring leg, NOT a fourth duplicate:
#   uptime-kuma  = external/LAN HTTP up/down (sees *.eli.kr edge breakage)
#   ntfy poller  = in-cluster ArgoCD Synced/Healthy + k3s version/node drift (4.2/5.1)
#   Beszel       = node CPU/mem/disk/net + HISTORY (what `kubectl top` shows instantly w/ no history/UI)
# It is explicitly NOT Prometheus/Grafana (the arch rejected a heavy metrics stack — NFR15 = ntfy
# alerting). If you find yourself adding PromQL/Grafana you've left the lane. Recorded in DECISIONS.md.
#
# SQLite at /beszel_data → strategy:Recreate + startupProbe (the Epic 4 / komga pattern).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel
  labels:
    app.kubernetes.io/name: beszel
    app.kubernetes.io/component: hub
spec:
  replicas: 1
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate          # SQLite single-writer
  selector:
    matchLabels:
      app.kubernetes.io/name: beszel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beszel
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: beszel
          # henrygd/beszel. CONFIRM the current stable tag at install + SWAP TO @sha256 digest at
          # cutover (AR29):
          #   docker buildx imagetools inspect henrygd/beszel:0.18.7
          image: henrygd/beszel:0.18.7
          ports:
            - containerPort: 8090
          env:
            - name: TZ
              value: Asia/Seoul
          startupProbe:
            httpGet:
              path: /
              port: 8090
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8090
          livenessProbe:
            httpGet:
              path: /
              port: 8090
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /beszel_data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beszel-data
