---
# homepage HTTPS (websecure :443) — INTERNAL: behind CF Access (operator-configured).
# external-dns publishes a public CNAME → CF tunnel so Access can gate it; LAN wildcard
# (*.eli.kr → 10.0.0.101) still resolves locally. Same model as the old Heimdall host.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  annotations:
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_HOMEPAGE}`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
  tls:
    secretName: homepage-tls
---
# homepage HTTP (web :80) — 301 to HTTPS.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: homepage-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-redirect
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_HOMEPAGE}`)
      kind: Rule
      middlewares:
        - name: homepage-redirect-https
      services:
        - name: homepage
          port: 3000
