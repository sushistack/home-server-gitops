# Story 4.6 — miniflux app ClusterIP. Public exposure is via the Traefik IngressRoute
# (ingressroute.yaml), not a host port (Compose bound a loopback-only host port behind NPM).
apiVersion: v1
kind: Service
metadata:
  name: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: miniflux
  ports:
    - name: http
      port: 8080
      targetPort: 8080
