# Story 4.6 — SealedSecrets (SEALED LIVE 2026-06-18): `miniflux-secrets` (app+db connection/creds)
# and `miniflux-backup-r2` (the backup CronJob's R2 credential). Sealed against THIS cluster's key
# (controller `sealed-secrets` in ns `sealed-secrets`) — safe to commit; only the cluster can decrypt.
# Origin: `miniflux-secrets` from the live Compose `miniflux-db` env (MINIFLUX_DB_PASSWORD, dual-run
# verified copy); `miniflux-backup-r2` re-sealed from the proven live `ntfy-backup-r2` (same scoped
# R2 cred / services bucket). DATABASE_URL host = the in-cluster FQDN (Reconciliation 2).
#
# RE-SEAL RECIPE (operator, if creds rotate):
#   PW=$(ssh root@<compose-host> 'docker exec miniflux-db printenv POSTGRES_PASSWORD')
#   FQDN=miniflux-db.miniflux.svc.cluster.local
#   kubectl create secret generic miniflux-secrets -n miniflux --dry-run=client -o yaml \
#     --from-literal=POSTGRES_DB=miniflux --from-literal=POSTGRES_USER=miniflux \
#     --from-literal=POSTGRES_PASSWORD="$PW" \
#     --from-literal=DATABASE_URL="postgres://miniflux:${PW}@${FQDN}:5432/miniflux?sslmode=disable" \
#     | kubeseal --format yaml --controller-name sealed-secrets --controller-namespace sealed-secrets
#   # R2: reseal from the live ntfy secret —
#   kubectl -n ntfy get secret ntfy-backup-r2 -o json \
#     | jq '{apiVersion,kind,type,data}+{metadata:{name:"miniflux-backup-r2",namespace:"miniflux"}}' \
#     | kubeseal --format yaml --controller-name sealed-secrets --controller-namespace sealed-secrets
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: miniflux-secrets
  namespace: miniflux
spec:
  encryptedData:
    DATABASE_URL: 
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: miniflux-secrets
      namespace: miniflux
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: miniflux-backup-r2
  namespace: miniflux
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: 
    RCLONE_CONFIG_R2_ENDPOINT: 
    RCLONE_CONFIG_R2_PROVIDER: 
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: 
    RCLONE_CONFIG_R2_TYPE: 
  template:
    metadata:
      name: miniflux-backup-r2
      namespace: miniflux
    type: Opaque
