# Story 5.6 — Suwayomi/Tachidesk (the manga DOWNLOADER/source). Writes new manga INTO the shared
# library, so it mounts the node-local manga PV READ-WRITE; its own DB/sources/settings live on a Longhorn PVC.
# Reconciliation 5: komga + suwayomi are two Deployments in one namespace sharing one library (the
# karakeep multi-component-in-one-workload shape).
#
# 🔴 LIBRARY PATH: the upstream image runs as uid 1000, data dir /home/suwayomi/.local/share/Tachidesk.
# The manga library (node-local PV) is mounted at /mnt/manga in BOTH komga (ro) and suwayomi (rw) — the
# SAME path the LXC used, so the migrated komga DB (library root /mnt/manga/mangas) and suwayomi H2 DB
# (existing download paths) resolve without rewriting. server.conf `server.downloadsPath = /mnt/manga`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: suwayomi
  labels:
    app.kubernetes.io/name: suwayomi
    app.kubernetes.io/component: downloader
spec:
  replicas: 1
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate          # single-writer data dir (DB) -> never two pods at once
  selector:
    matchLabels:
      app.kubernetes.io/name: suwayomi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: suwayomi
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 1000      # upstream image user; the Longhorn PVC is chowned to match below
      # A freshly-provisioned Longhorn volume mounts root:root 0755 -> EACCES when uid 1000 opens its
      # DB. Chown it once before the app starts (the karakeep-bridge pattern). The node-local manga PV's
      # perms were set at copy time (chown 1000 on k3s-cp-1:/mnt/manga), not here.
      initContainers:
        - name: data-fix
          image: busybox:1.36
          command:
            - sh
            - -xc
            - |
              d=/home/suwayomi/.local/share/Tachidesk
              owner="$(stat -c %u "$d")"
              if [ "$owner" != "1000" ]; then
                echo "=====> Fixing $d ownership to uid 1000"
                chown -R 1000:1000 "$d"
              else
                echo "=====> Nothing to do for $d"
              fi
          securityContext:
            runAsUser: 0      # chown needs root; the app container then runs as 1000
          volumeMounts:
            - name: config
              mountPath: /home/suwayomi/.local/share/Tachidesk
      containers:
        - name: suwayomi
          # ghcr.io/suwayomi/tachidesk — digest-pinned (AR29; :stable is a FLOATING tag, retired).
          # Digest = the live-running image as of 2026-06-19. Re-resolve on a deliberate bump:
          #   docker buildx imagetools inspect ghcr.io/suwayomi/tachidesk:stable
          image: ghcr.io/suwayomi/tachidesk@sha256:6bb8fa8cf1cf86589e5851f2f1c2ede5c8248d53982ec1795a715dcde85b1da2  # stable @ 2026-06-19
          ports:
            - containerPort: 4567
          env:
            - name: TZ
              value: Asia/Seoul
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /
              port: 4567
            failureThreshold: 40
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 4567
          livenessProbe:
            httpGet:
              path: /
              port: 4567
          volumeMounts:
            - name: config
              mountPath: /home/suwayomi/.local/share/Tachidesk   # Tachidesk data dir (DB) on Longhorn
            - name: manga
              mountPath: /mnt/manga  # MUST match the LXC path the H2 DB references; downloadsPath=/mnt/manga, READ-WRITE
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: suwayomi-config
        - name: manga
          persistentVolumeClaim:
            claimName: komga-manga-local
