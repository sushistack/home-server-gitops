# Story 4.4 — public raw-TCP 33010 route. Binds the `anytype-tcp` static entryPoint (declared by the
# k3s-owned HelmChartConfig, infra/traefik/) to the anytype Service. Anytype is NOT TLS, so there is
# no SNI to match on → HostSNI(`*`) takes everything arriving on that dedicated entryPoint. This is
# the ArgoCD-managed HALF of the boundary; the entryPoint itself is k3s-owned (outside ArgoCD).
# traefik.io/v1alpha1 (v3) — the old traefik.containo.us API silently fails.
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: anytype
spec:
  entryPoints:
    - anytype-tcp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: anytype
          port: 33010
