# Story 4.4 — SealedSecret STUBS (three): `anytype-secrets` (heart wallet: MNEMONIC + ACCOUNT_ID),
# `anytype-backup-r2` (the backup CronJobs' R2 credential, shared by both component jobs in this ns),
# and `ghcr-sushistack` (GHCR pull cred for the PRIVATE heart image — no shared pull secret to reuse).
# A real SealedSecret is encrypted against the LIVE cluster's sealing key and holds the REAL values —
# it CANNOT be authored from the repo. The operator seals real values at cutover pre-flight (4.1/4.6
# precedent). // ponytail: stubs + one recipe is lazy-correct; do NOT fabricate ciphertext.
#
# ───────────────────────────────────────────────────────────────────────────────────────────────
# OPERATOR RECIPE — run on a host with kubeseal + the live cluster context. Origin of the values =
# the live Compose `.env.apps` (ANYTYPE_MNEMONIC, ANYTYPE_ACCOUNT_ID) and the SAME R2 cred values as
# ntfy-backup-r2. NOTE: any-sync's NODE identity is NOT a secret here — it lives in /data and is
# carried by the data copy (Reconciliation 3); these secrets are only heart's account wallet.
#
#   MNEMONIC='<ANYTYPE_MNEMONIC from .env.apps>'
#   ACCT='<ANYTYPE_ACCOUNT_ID from .env.apps>'
#
#   # 1) heart wallet secret
#   kubectl create secret generic anytype-secrets -n anytype --dry-run=client -o yaml \
#     --from-literal=ANYTYPE_MNEMONIC="$MNEMONIC" \
#     --from-literal=ANYTYPE_ACCOUNT_ID="$ACCT" \
#     | kubeseal --format yaml \
#       --controller-name sealed-secrets --controller-namespace kube-system \
#     > /tmp/anytype-secrets.sealed.yaml
#
#   # 2) backup R2 credential (services bucket; reuse the SAME R2 values as ntfy-backup-r2)
#   kubectl create secret generic anytype-backup-r2 -n anytype --dry-run=client -o yaml \
#     --from-literal=RCLONE_CONFIG_R2_TYPE=s3 \
#     --from-literal=RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
#     --from-literal=RCLONE_CONFIG_R2_ENDPOINT='<R2 S3 endpoint>' \
#     --from-literal=RCLONE_CONFIG_R2_ACCESS_KEY_ID='<R2 access key id>' \
#     --from-literal=RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='<R2 secret access key>' \
#     | kubeseal --format yaml \
#       --controller-name sealed-secrets --controller-namespace kube-system \
#     > /tmp/anytype-backup-r2.sealed.yaml
#
#   # 3) GHCR pull credential for the PRIVATE heart image (ghcr.io/sushistack/*). anytype-heart is the
#   #    FIRST private-image workload in this repo — there is NO shared/cluster pull secret to inherit,
#   #    so it MUST be created in THIS namespace (imagePullSecrets are namespaced). Username = GH user,
#   #    password = a GH PAT with read:packages.
#   kubectl create secret docker-registry ghcr-sushistack -n anytype --dry-run=client -o yaml \
#     --docker-server=ghcr.io \
#     --docker-username='<github username>' \
#     --docker-password='<github PAT with read:packages>' \
#     | kubeseal --format yaml \
#       --controller-name sealed-secrets --controller-namespace kube-system \
#     > /tmp/ghcr-sushistack.sealed.yaml
#
# Replace the three stub documents below with the `spec.encryptedData` from those files, commit, and
# let ArgoCD apply (the controller decrypts in-cluster to the matching Secret name+namespace).
# ───────────────────────────────────────────────────────────────────────────────────────────────
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anytype-secrets
  namespace: anytype
spec:
  encryptedData:
    # STUB — replace with real sealed values (recipe above). These keys MUST be present:
    ANYTYPE_MNEMONIC: REPLACE_AT_CUTOVER
    ANYTYPE_ACCOUNT_ID: REPLACE_AT_CUTOVER
  template:
    metadata:
      name: anytype-secrets
      namespace: anytype
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anytype-backup-r2
  namespace: anytype
spec:
  encryptedData:
    # STUB — replace with real sealed values (recipe above).
    RCLONE_CONFIG_R2_TYPE: REPLACE_AT_CUTOVER
    RCLONE_CONFIG_R2_PROVIDER: REPLACE_AT_CUTOVER
    RCLONE_CONFIG_R2_ENDPOINT: REPLACE_AT_CUTOVER
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: REPLACE_AT_CUTOVER
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: REPLACE_AT_CUTOVER
  template:
    metadata:
      name: anytype-backup-r2
      namespace: anytype
---
# GHCR pull cred for the PRIVATE ghcr.io/sushistack/home.server/anytype-heart image. Referenced by
# deployment-heart.yaml `imagePullSecrets: [ghcr-sushistack]`. Without this Secret existing in the
# anytype ns, the heart pod ImagePullBackOffs (the bundle image is public, so anysync needs none).
# The template TYPE must be kubernetes.io/dockerconfigjson so kubelet treats it as a registry cred.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-sushistack
  namespace: anytype
spec:
  encryptedData:
    # STUB — replace with the real sealed value (recipe step 3 above).
    .dockerconfigjson: REPLACE_AT_CUTOVER
  template:
    type: kubernetes.io/dockerconfigjson
    metadata:
      name: ghcr-sushistack
      namespace: anytype
