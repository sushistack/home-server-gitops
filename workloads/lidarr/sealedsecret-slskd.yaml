# Session 2 — slskd Soulseek credentials + primary API key. SEALED to name+ns
# (slskd-soulseek/lidarr) -> safe to commit; only this cluster decrypts it.
# Consumed via envFrom: secretRef in deployment-slskd.yaml. SLSKD_API_KEY must match
# the [Slskd] api_key in soularr-config.
#
# To ROTATE, re-run:
#
#   kubectl create secret generic slskd-soulseek -n lidarr \
#     --from-literal=SLSKD_SLSK_USERNAME='<user>' \
#     --from-literal=SLSKD_SLSK_PASSWORD='<pass>' \
#     --from-literal=SLSKD_API_KEY='<16-255 char api key>' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace sealed-secrets --controller-name sealed-secrets --format yaml \
#   > workloads/lidarr/sealedsecret-slskd.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: slskd-soulseek
  namespace: lidarr
spec:
  encryptedData:
    SLSKD_API_KEY: 
    SLSKD_SLSK_PASSWORD: 
    SLSKD_SLSK_USERNAME: 
  template:
    metadata:
      name: slskd-soulseek
      namespace: lidarr
