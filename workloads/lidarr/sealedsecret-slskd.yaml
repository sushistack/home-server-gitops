# Session 2 — slskd Soulseek credentials. SEALED to name+ns (slskd-soulseek/lidarr) -> safe to commit;
# only this cluster decrypts it. Consumed via envFrom: secretRef in deployment-slskd.yaml (env overrides
# slskd.yml). To ROTATE the Soulseek account, re-run:
#
#   kubectl create secret generic slskd-soulseek -n lidarr \
#     --from-literal=SLSKD_SLSK_USERNAME='<user>' --from-literal=SLSKD_SLSK_PASSWORD='<pass>' \
#     --dry-run=client -o yaml \\
#   | kubeseal --controller-namespace sealed-secrets --controller-name sealed-secrets --format yaml \\
#   > workloads/lidarr/sealedsecret-slskd.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: slskd-soulseek
  namespace: lidarr
spec:
  encryptedData:
    SLSKD_SLSK_PASSWORD: 
    SLSKD_SLSK_USERNAME: 
  template:
    metadata:
      name: slskd-soulseek
      namespace: lidarr
