# Session 2 — soularr config.ini (whole file is secret: it holds Lidarr + slskd API keys).
# SEALED to name+ns (soularr-config/lidarr) after Lidarr first boot. Mounted at
# /data/config.ini (subPath) in deployment-soularr.yaml.
#
# To ROTATE, author config.ini from the upstream soularr template, then:
#
#   kubectl create secret generic soularr-config -n lidarr \
#     --from-file=config.ini=./config.ini \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace sealed-secrets --controller-name sealed-secrets --format yaml \
#   > workloads/lidarr/sealedsecret-soularr.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: soularr-config
  namespace: lidarr
spec:
  encryptedData:
    config.ini: 
  template:
    metadata:
      name: soularr-config
      namespace: lidarr
