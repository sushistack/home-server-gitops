# Session 2 — soularr config.ini (whole file is secret: it holds the Lidarr API key). 🔴 PLACEHOLDER —
# the encryptedData below is NOT a real sealed value; it will NOT decrypt. RESEAL with a real config.ini
# before the first ArgoCD sync. The Lidarr API key only exists AFTER Lidarr's first boot, so this is a
# 2-stage process (see runbook.md "If DOWN" / migration). Author config.ini from the template, then:
#
#   kubectl create secret generic soularr-config -n lidarr \
#     --from-file=config.ini=./config.ini \
#     --dry-run=client -o yaml \
#   | kubeseal --format yaml > workloads/lidarr/sealedsecret-soularr.yaml
#
# config.ini essentials ([Lidarr] host_url=http://lidarr:8686, api_key=<from Lidarr>;
# [Slskd] host_url=http://slskd:5030, api_key= (blank — slskd web auth disabled),
# download_dir=/mnt/manga/music/.incoming). Mounted at /data/config.ini (subPath) in deployment-soularr.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: soularr-config
  namespace: lidarr
spec:
  encryptedData:
    config.ini: PLACEHOLDER_RESEAL_BEFORE_SYNC
  template:
    metadata:
      name: soularr-config
      namespace: lidarr
