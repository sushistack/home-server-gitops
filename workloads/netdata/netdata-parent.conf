# Netdata PARENT netdata.conf — central dashboard + long-horizon history (the dbengine store).
# Mounted via subPath at /etc/netdata/netdata.conf (configMapGenerator `netdata-config`).
# v2 retention syntax: `dbengine tier N retention size/time` (the legacy `disk space MB` is pre-v2).
# Single tier keeps it simple for a 3-node homelab; ~15d on a Longhorn 10Gi PVC (8GiB cap leaves headroom).
[global]
    hostname = netdata-parent

[db]
    mode = dbengine
    storage tiers = 1
    dbengine tier 0 retention size = 8GiB
    dbengine tier 0 retention time = 15d

[web]
    bind to = 0.0.0.0:19999

# Alarms OFF (ntfy/uptime-kuma already own alerting; Netdata's defaults are noisy). ML OFF (CPU).
[health]
    enabled = no

[ml]
    enabled = no

# No local registry / no Netdata Cloud (DO_NOT_TRACK=1 is set in the Deployment env too).
[registry]
    enabled = no
