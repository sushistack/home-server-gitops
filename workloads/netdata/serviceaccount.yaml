# Netdata children RBAC — the ONLY reason the DaemonSet needs an identity: turning raw cgroup
# hashes into real namespace/pod names. cgroups.plugin's cgroup-name.sh queries the node's kubelet
# /pods endpoint (nodes/proxy) and the API for pod/namespace names. The PARENT needs no RBAC (it
# only receives streams + serves the dashboard) — so this SA is bound to the children alone.
#
# Deliberately MINIMAL (review blocker, AC): per-pod naming only. The fuller netdata k8s_state
# cluster-state collector wants services/configmaps/secrets/deployments/jobs — NOT granted here.
# Granting a DaemonSet on every control-plane node clusterwide `secrets` read for an unused feature
# is the privilege we refuse by default. Expand only if the cluster-state dashboard is later wanted.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netdata-children
  namespace: netdata
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netdata-children
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get]
  # kubelet /pods proxy — how cgroup-name.sh maps a cgroup to its pod on THIS node.
  - apiGroups: [""]
    resources: [nodes/proxy]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netdata-children
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netdata-children
subjects:
  - kind: ServiceAccount
    name: netdata-children
    namespace: netdata
