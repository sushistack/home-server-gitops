# Netdata CHILD netdata.conf — collects host + per-pod cgroup metrics and STREAMS them to the parent.
# Mounted via subPath at /etc/netdata/netdata.conf (configMapGenerator `netdata-config`).
#
# [db] mode = ram: the child keeps only a tiny in-memory ring buffer — the parent owns the durable
# dbengine history, so the child needs no disk and no PVC.
# [web] mode = none (review blocker): the child runs hostNetwork, so a live web server would expose an
# UNAUTHENTICATED dashboard on every node's :19999 over the LAN. We want exactly ONE dashboard (parent).
# Disabling web does not affect streaming (separate subsystem).
[db]
    mode = ram

[web]
    mode = none

[health]
    enabled = no

[ml]
    enabled = no

[registry]
    enabled = no
