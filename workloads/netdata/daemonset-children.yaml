# Netdata CHILDREN (= beszel agent): one pod per k3s node collecting host + per-pod cgroup metrics and
# STREAMING them to the parent. DaemonSet, node-local.
#
# Host visibility:
#   /host/proc, /host/sys, /host/etc/os-release  — the /host/ prefix is mandatory (netdata's plugins
#   look there). cgroup v2 metrics come through /host/sys — NO separate /sys/fs/cgroup mount, and NO
#   docker/containerd socket (containerd cluster — pod-name resolution is via the kubelet, see below).
#   hostPID: gives apps.plugin the real host process table.
#
# Per-pod NAMES (not cgroup hashes): cgroups.plugin's cgroup-name.sh queries the node's own kubelet at
#   KUBELET_URL=https://localhost:10250/pods  (USE_KUBELET_FOR_PODS_METADATA=1) — which is why the pod
#   runs hostNetwork (so localhost == the node) and carries the netdata-children SA token. The k3s
#   kubelet serves a SELF-SIGNED cert; netdata's helper queries it with an insecure curl, so no extra
#   CA wiring is needed. If pods show as cgroup hashes instead of names, this is the path to debug.
#
# Least privilege (review blocker): capabilities add SYS_PTRACE ONLY. SYS_ADMIN is deliberately NOT
#   granted — it only buys per-container network/socket detail and is near-root on a control-plane node.
#   Opt-in later if that detail is actually wanted.
#
# CONFIRM tag + SWAP TO @sha256 at cutover (AR29):  docker buildx imagetools inspect netdata/netdata:v2.10.3
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netdata-children
  labels:
    app.kubernetes.io/name: netdata-children
    app.kubernetes.io/component: child
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: netdata-children
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netdata-children
    spec:
      serviceAccountName: netdata-children
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet      # still resolve the parent Service DNS
      tolerations:
        # k3s servers usually run untainted, but tolerate the control-plane/master taints so a child
        # lands on every node even if one is tainted later (the beszel-agent pattern).
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: netdata
          image: netdata/netdata:v2.10.3
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE      # discover/inspect host processes (apps.plugin). NO SYS_ADMIN.
          env:
            - name: TZ
              value: Asia/Seoul
            - name: DO_NOT_TRACK
              value: "1"
            - name: USE_KUBELET_FOR_PODS_METADATA
              value: "1"
            - name: KUBELET_URL
              value: "https://localhost:10250"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true     # cgroups.plugin only READS /sys; RO shrinks the blast radius (review)
            - name: os-release
              mountPath: /host/etc/os-release
              readOnly: true
            - name: config              # netdata.conf — child role (web off, db=ram)
              mountPath: /etc/netdata/netdata.conf
              subPath: netdata-child.conf
            - name: stream              # stream.conf (api key + destination) — from the SealedSecret
              mountPath: /etc/netdata/stream.conf
              subPath: stream-child.conf
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: os-release
          hostPath:
            path: /etc/os-release
            type: File          # fail loudly if absent, never silently mount a new empty dir
        - name: config
          configMap:
            name: netdata-config
        - name: stream
          secret:
            secretName: netdata-stream
