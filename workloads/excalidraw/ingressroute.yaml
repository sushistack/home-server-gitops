# Story 1.4: per-host cutover of the draw host onto the cluster's Traefik (HTTP only).
# entryPoint `web` (:80) — NO websecure/TLS block yet (Story 1.5 adds cert-manager TLS).
# Host is tokenized (${SECRET:DOMAIN_DRAW}); the render CMP substitutes the real value at
# ArgoCD sync time (see ansible/argocd-values.yaml). The literal host is blocked by the
# exposure gate, and ArgoCD would otherwise sync the literal token string into Traefik.
apiVersion: traefik.io/v1alpha1   # v3 API group — old traefik.containo.us is removed (silent fail).
kind: IngressRoute
metadata:
  name: excalidraw
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_DRAW}`)
      kind: Rule
      services:
        - name: excalidraw
          port: 80
