# Story 4.5 — SealedSecrets (THREE), all REALLY SEALED against this cluster's sealing key
# (controller in ns sealed-secrets — NOT kube-system). Safe to commit; only this cluster decrypts.
#   karakeep-secrets   : app + bridge secrets, consumed envFrom: secretRef ONLY (no inline env/valueFrom).
#                        NEXTAUTH_SECRET, MEILI_MASTER_KEY, OPENAI_API_KEY (= the DeepSeek key) for web/meili;
#                        KARAKEEP_API_KEY, ANYTYPE_API_KEY, ANYTYPE_SPACE_ID, WEBHOOK_TOKEN for the bridge.
#                        Sourced 2026-06-19 from the LIVE Compose container env (docker exec, NOT hand-typed
#                        — avoids quote/format slips), the dual-run origin of truth (.env.apps / sops).
#   karakeep-backup-r2 : rclone R2 remote for the backup CronJobs (bucket homelab-k3s-services-backup,
#                        Object R&W token = internal/r2-k3s.env; same token as the other k3s backups).
#   ghcr-sushistack    : GHCR pull cred for the PRIVATE bridge image (dockerconfigjson; reused from the
#                        anytype cred, re-sealed for ns karakeep — SealedSecrets are bound to name+ns).
# Re-seal: kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets --format yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: karakeep-secrets
  namespace: karakeep
spec:
  encryptedData:
    ANYTYPE_API_KEY: 
    ANYTYPE_SPACE_ID: 
    KARAKEEP_API_KEY: 
    MEILI_MASTER_KEY: 
    NEXTAUTH_SECRET: 
    OPENAI_API_KEY: 
    WEBHOOK_TOKEN: 
  template:
    metadata:
      name: karakeep-secrets
      namespace: karakeep
---
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: karakeep-backup-r2
  namespace: karakeep
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: 
    RCLONE_CONFIG_R2_ENDPOINT: 
    RCLONE_CONFIG_R2_PROVIDER: 
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: 
    RCLONE_CONFIG_R2_TYPE: 
  template:
    metadata:
      name: karakeep-backup-r2
      namespace: karakeep
---
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-sushistack
  namespace: karakeep
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: ghcr-sushistack
      namespace: karakeep
    type: kubernetes.io/dockerconfigjson
