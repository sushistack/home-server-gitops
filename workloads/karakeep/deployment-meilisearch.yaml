# Story 4.5 — karakeep-meilisearch: bookmark search index (ports docker-compose.yml:174-199).
# INTERNAL ONLY (Compose: karakeep-internal net, no host port) — the master key gates a :7700 index
# API that must stay reachable from karakeep-web ALONE (NetworkPolicy enforces, AC2). Index is
# REBUILDABLE derived state (Reconciliation 5): fresh PVC, karakeep reindexes from db.db on first
# boot. Recreate + RWO PVC anyway so a future reindex never double-mounts the data dir.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-meilisearch
  labels:
    app.kubernetes.io/name: karakeep-meilisearch
    app.kubernetes.io/component: search
spec:
  replicas: 1
  progressDeadlineSeconds: 120
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: karakeep-meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karakeep-meilisearch
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: karakeep-meilisearch
          # getmeili/meilisearch:v1.41.0 pinned by digest (AR29) to the live image (docker inspect
          # the live Compose host, 2026-06-19). The binary index format is version-coupled — pin so a fresh
          # reindex can't trip a format drift.
          image: getmeili/meilisearch@sha256:860fa4baed04ae1c235de870edab0c8006227546dea1bbb6411fbfc5e27cf1db
          ports:
            - containerPort: 7700
          # MEILI_MASTER_KEY (secret) + MEILI_ENV/MEILI_NO_ANALYTICS (config). envFrom the shared
          # secret too — meili reads only MEILI_*; extra keys are ignored (faithful to Compose's
          # shared env_file). NEVER inline env: ${VAR}/valueFrom (story Task 3).
          envFrom:
            - configMapRef:
                name: karakeep-config
            - secretRef:
                name: karakeep-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          # The Compose busybox/IPv6 gotcha (use the IPv4 loopback, not localhost) was for an
          # IN-CONTAINER exec check. A k8s httpGet probe is dialed by the kubelet against the POD IP
          # (IPv4), never "localhost", so the ::1-resolution trap simply does not arise here — and
          # pinning the probe `host:` to loopback would (wrongly) point the kubelet at its OWN
          # loopback. Meili binds 0.0.0.0:7700, so a plain httpGet on the pod IP is correct.
          startupProbe:
            httpGet:
              path: /health
              port: 7700
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
          volumeMounts:
            - name: meili
              mountPath: /meili_data
      volumes:
        - name: meili
          persistentVolumeClaim:
            claimName: karakeep-meili
