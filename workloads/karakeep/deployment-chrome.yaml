# Story 4.5 — karakeep-chrome: headless Chrome for crawl/screenshot (ports docker-compose.yml:204-228).
# THE threat model behind AC2: it binds an UNAUTHENTICATED CDP on 0.0.0.0:9222 — anything that can
# reach :9222 can drive the browser (file:// reads, cookie theft). So it stays INTERNAL, reachable
# from karakeep-web ALONE (NetworkPolicy, AC2), exactly as the Compose karakeep-internal net enforced.
# STATELESS (no PVC) -> RollingUpdate is fine. Chrome itself fetches the bookmarked pages, so it
# needs egress to the public internet (networkpolicy.yaml NP: chrome egress 80/443 + DNS).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-chrome
  labels:
    app.kubernetes.io/name: karakeep-chrome
    app.kubernetes.io/component: browser
spec:
  replicas: 1
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app.kubernetes.io/name: karakeep-chrome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karakeep-chrome
    spec:
      containers:
        - name: karakeep-chrome
          # gcr.io/zenika-hub/alpine-chrome:124 pinned by digest (AR29) to the live image
          # (docker inspect the live Compose host, 2026-06-19).
          image: gcr.io/zenika-hub/alpine-chrome@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
          ports:
            - containerPort: 9222
          envFrom:
            - configMapRef:
                name: karakeep-config   # TZ only; chrome reads no secret -> no secretRef (less spread)
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi   # headless Chrome is memory-hungry on heavy pages
          # Ports the Compose `nc -z` loopback listen check to a tcpSocket probe (CDP speaks
          # WebSocket, no plain health path). startupProbe gives Chrome time to bring up the CDP listener.
          startupProbe:
            tcpSocket:
              port: 9222
            failureThreshold: 20
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 9222
          livenessProbe:
            tcpSocket:
              port: 9222
