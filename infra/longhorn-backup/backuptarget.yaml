# Longhorn volume-level OFFSITE backup target -> R2 `homelab-k3s-backup` (Story 5.10, 2026-06-20).
# Why this exists: all 3 k3s nodes are VMs on a SINGLE Proxmox host, so Longhorn's 3 replicas all
# live on one physical machine — a host loss takes every replica. The app-level DB dumps already
# cover critical DB state offsite; THIS adds offsite coverage for the volumes WITHOUT an app dump
# (semaphore, heimdall, beszel, suwayomi, …) which otherwise had zero off-host copy.
# Longhorn 1.12 manages the target via this BackupTarget CR (the legacy `backup-target` Setting is
# gone). The `default` object is created empty by longhorn-manager; ArgoCD adopts + populates it.
# region in the URL is cosmetic for R2 (path-style); us-east-1 is a valid placeholder.
apiVersion: longhorn.io/v1beta2
kind: BackupTarget
metadata:
  name: default
  namespace: longhorn-system
spec:
  backupTargetURL: s3://homelab-k3s-backup@us-east-1/
  credentialSecret: longhorn-r2-backup
  pollInterval: 5m0s
