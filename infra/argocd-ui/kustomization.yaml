apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ArgoCD UI ingress (read/write web console). Synced by app argocd-ui (argocd/apps/argocd-ui.yaml)
# into the argocd namespace so the IngressRoute can reference svc argocd-server in-namespace (no
# Traefik cross-namespace allowance needed). kustomization.yaml present -> render CMP substitutes
# ${SECRET:DOMAIN_ARGOCD}.
# ponytail: no http->websecure redirect (LAN admin types https); add one like semaphore's if wanted.
resources:
  - ingressroute.yaml
  - certificate.yaml
