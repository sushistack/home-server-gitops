# Langfuse — Traefik IngressRoute + HTTP→HTTPS redirect.
# CF Access (Google SSO) gate: the external-dns annotation publishes the DNS record so
# Cloudflare Access can gate the route. LAN-only DNS override → 10.0.0.101 (OpenWrt).
# No ipAllowList (tunnel egresses from a LAN IP → allowlist would admit internet-via-tunnel).
# Same pattern as netdata (internal-only, CF Access protected).
#
# SERVICE NOTE: the Langfuse Helm chart (release: langfuse) creates `langfuse-web` on port 3000.
# If the service name differs after deploy, verify with:
#   kubectl get svc -n langfuse
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: langfuse-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTPS (websecure :443) — serves Langfuse UI + API with the cert-manager cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: langfuse
  annotations:
    # Behind CF Access (Google SSO). Public DNS record so Access can gate it.
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_LANGFUSE}`)
      kind: Rule
      services:
        - name: langfuse-web
          port: 3000
  tls:
    secretName: langfuse-tls
---
# HTTP (web :80) — 301 to HTTPS via the redirect middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: langfuse-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_LANGFUSE}`)
      kind: Rule
      middlewares:
        - name: langfuse-redirect-https
      services:
        - name: langfuse-web   # required by IngressRoute schema; middleware redirects before it's hit
          port: 3000
