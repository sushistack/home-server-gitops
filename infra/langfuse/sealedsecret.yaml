# langfuse-secrets — all Langfuse credentials (9 keys).
# Sealed against THIS cluster's key (sealed-secrets controller in ns sealed-secrets).
#
# KEY REFERENCE (Bitnami PostgreSQL subchart uses two separate keys):
#   nextauth-secret      → langfuse.nextauth.secret (JWT signing)
#   salt                 → langfuse.salt (password hashing)
#   encryption-key       → langfuse.encryptionKey (256-bit hex)
#   postgresql-password  → POSTGRES_PASSWORD (langfuse app user — secretKeys.userPasswordKey default)
#   password             → POSTGRES_POSTGRES_PASSWORD (postgres superuser — secretKeys.adminPasswordKey default)
#   clickhouse-password  → clickhouse.auth.existingSecret
#   redis-password       → redis.auth.existingSecret
#   minio-root-user      → s3.auth + s3.accessKeyId
#   minio-root-password  → s3.auth + s3.secretAccessKey
#
# RE-SEAL: docs/deploy-prompts/langfuse-seal-recipe.md
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: langfuse-secrets
  namespace: langfuse
spec:
  encryptedData:
    clickhouse-password: 
    encryption-key: 
    minio-root-password: 
    minio-root-user: 
    nextauth-secret: 
    password: 
    postgresql-password: 
    redis-password: 
    salt: 
  template:
    metadata:
      name: langfuse-secrets
      namespace: langfuse
    type: Opaque
