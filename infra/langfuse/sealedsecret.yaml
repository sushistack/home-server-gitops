# langfuse-secrets — all Langfuse credentials in one SealedSecret (8 keys).
# Sealed against THIS cluster's key (sealed-secrets controller in ns sealed-secrets).
#
# RE-SEAL (if credentials rotate):
#   See docs/deploy-prompts/langfuse-seal-recipe.md for the full recipe.
#   Short: kubectl create secret ... | kubeseal --format yaml > sealed.yaml
#          then replace the encryptedData block here and commit.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: langfuse-secrets
  namespace: langfuse
spec:
  encryptedData:
    clickhouse-password: 
    encryption-key: 
    minio-root-password: 
    minio-root-user: 
    nextauth-secret: 
    postgresql-password: 
    redis-password: 
    salt: 
  template:
    metadata:
      name: langfuse-secrets
      namespace: langfuse
    type: Opaque
