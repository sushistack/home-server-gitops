# langfuse-secrets — all Langfuse credentials in one SealedSecret (8 keys).
# Sealed against THIS cluster's key (sealed-secrets controller in ns sealed-secrets).
#
# KEY REFERENCE:
#   nextauth-secret    → langfuse.nextauth.secret (JWT signing)
#   salt               → langfuse.salt (password hashing)
#   encryption-key     → langfuse.encryptionKey (256-bit hex)
#   password           → postgresql.auth.existingSecret (Bitnami default key)
#   clickhouse-password → clickhouse.auth.existingSecret
#   redis-password      → redis.auth.existingSecret
#   minio-root-user    → s3.auth.rootUserSecretKey
#   minio-root-password → s3.auth.rootPasswordSecretKey + s3.accessKeyId/secretAccessKey
#
# RE-SEAL: docs/deploy-prompts/langfuse-seal-recipe.md
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: langfuse-secrets
  namespace: langfuse
spec:
  encryptedData:
    clickhouse-password: 
    encryption-key: 
    minio-root-password: 
    minio-root-user: 
    nextauth-secret: 
    password: 
    redis-password: 
    salt: 
  template:
    metadata:
      name: langfuse-secrets
      namespace: langfuse
    type: Opaque
