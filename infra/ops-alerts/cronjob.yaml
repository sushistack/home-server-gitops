# The whole alerting slice: ONE CronJob (AC4 — not a monitoring stack). Polls every 15 min, reads
# cluster state via the SA's read-only RBAC, publishes hits to ntfy. Image bundles kubectl+jq+curl.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ops-alerter
  namespace: ops-alerts
spec:
  schedule: "*/15 * * * *"
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3      # keep failures visible across polls (mirrors the backup actor)
  jobTemplate:
    spec:
      activeDeadlineSeconds: 180   # a handful of kubectl reads + curls; bound so a hung run goes Failed (visible)
      backoffLimit: 1              # a failed poll (egress block -> /readyz FATAL) won't pass on instant retry; 1 retry, not the default 6
      template:
        metadata:
          # ops-alerter has no Service, so labelling the pod with the app name is safe (no dead
          # endpoint). The egress NetworkPolicy podSelector matches THIS label.
          labels:
            app.kubernetes.io/name: ops-alerter
        spec:
          serviceAccountName: ops-alerter
          restartPolicy: OnFailure
          containers:
            - name: alerter
              # bundles kubectl + jq + curl. PIN to a digest at hardening (AR29 — exact tag for now):
              #   docker buildx imagetools inspect alpine/k8s:1.31.0
              image: alpine/k8s:1.31.0
              command: ["/bin/sh", "/scripts/alert.sh"]
              env:
                - name: NTFY_URL
                  value: http://ntfy.ntfy.svc.cluster.local   # FQDN (AR28 — short name won't resolve cross-ns)
                # Story 5.8 (AC3) — topic split by concern (was single NTFY_TOPIC: alerts). The token
                # in ops-alerts-secrets must hold `wo` on BOTH topics (ntfy is deny-all; operator grants
                # via `ntfy access` — see legacy-teardown.md). homelab-monitor (Beszel) is not used here.
                - name: NTFY_TOPIC_CRITICAL
                  value: homelab-critical                       # NFR15a stateful/backup failures (+ R2)
                - name: NTFY_TOPIC_OPS
                  value: homelab-ops                            # NFR15b drift/health
                - name: TZ
                  value: Asia/Seoul
                # Story 5.8 (AC2) — R2 backup monitor thresholds (read by alert.sh; the R2 block is
                # active via the ops-alerts-r2 envFrom below — LIVE since gitops a800d21).
                - name: R2_THRESHOLD_GB
                  value: "8"                                    # alert before the ~10 GB R2 free tier
                - name: R2_STALE_HOURS
                  value: "13"                                   # 2x the 6h backup cadence + headroom
                - name: R2_STALE_HOURS_DAILY
                  value: "27"                                   # daily-cadence svcs (24h RPO + headroom)
                - name: R2_DAILY_SVCS
                  value: "anytype anytype-heart"                # relaxed to daily backup (gitops c1c11c1)
                - name: R2_RETENTION_DAYS
                  value: "35"                                   # oldest object older than this => rotation broke
                # NFR15b (Story 5.1) — k3s version pin baked from versions.yaml (the cluster can't read
                # Git). Bump here whenever versions.yaml#k3s.version bumps (keep in lockstep on upgrade).
                - name: K3S_PINNED_VERSION
                  value: v1.35.5+k3s1
                # ArgoCD apps whose OutOfSync is benign steady-state (self-managed argocd = perpetual
                # Helm/SSA self-diff). Space-separated. Health is never ignored.
                - name: DRIFT_SYNC_IGNORE
                  value: argocd
              envFrom:
                - secretRef:
                    name: ops-alerts-secrets   # NTFY_TOKEN (write on the topics) — SealedSecret, never inline
                # Story 5.8 (AC2) — R2 cred (RCLONE_CONFIG_R2_*) for the capacity/rotation check.
                # Resealed from ntfy-backup-r2 to ns ops-alerts. Bucket-scoped Object R&W — it can List
                # + size objects in the two backup buckets, which is all the check needs.
                - secretRef:
                    name: ops-alerts-r2
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi    # memory-only limit (no CPU limit -> no throttle), per AR29
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: ops-alerter-script
