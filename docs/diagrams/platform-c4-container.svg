<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <!-- Platform C4 (container view): layer boundary + in-cluster planes + external services.
       Hand-exported from platform-c4-container.mmd. Role-based logical names only —
       no real host/IP/domain (AR35 + exposure gate). -->
  <style>
    .box{fill:#f4f6fb;stroke:#5b6b8c;stroke-width:1.5;}
    .panel{fill:#ffffff;stroke:#9aa7c0;stroke-width:1.5;stroke-dasharray:4 3;}
    .lbl{fill:#1f2937;}
    .title{fill:#334155;font-weight:700;font-size:14px;}
    .edge{stroke:#5b6b8c;stroke-width:1.5;fill:none;}
    .edgetxt{fill:#475569;font-size:11px;}
    .dash{stroke:#5b6b8c;stroke-width:1.5;fill:none;stroke-dasharray:5 4;}
    .note{fill:#9a3412;font-size:11px;font-style:italic;}
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6b8c"/>
    </marker>
  </defs>

  <!-- OUTSIDE panel -->
  <rect class="panel" x="20" y="20" width="600" height="120" rx="10"/>
  <text class="title" x="36" y="44">Outside the cluster (layer-boundary rule)</text>
  <rect class="box" x="40" y="62" width="210" height="44" rx="8"/>
  <text class="lbl" x="145" y="89" text-anchor="middle">Household router (internet edge)</text>
  <rect class="panel" x="290" y="56" width="310" height="72" rx="8"/>
  <text class="title" x="304" y="78" font-size="12px">Proxmox host — Plane 0: bare-metal recovery</text>
  <text class="note" x="304" y="98">single physical host =</text>
  <text class="note" x="304" y="114">software HA real, hardware HA NOT</text>

  <!-- EXTERNAL panel -->
  <rect class="panel" x="660" y="20" width="300" height="580" rx="10"/>
  <text class="title" x="676" y="44">External services</text>
  <rect class="box" x="690" y="64" width="240" height="48" rx="8"/>
  <text class="lbl" x="810" y="85" text-anchor="middle">Cloudflare + public tunnel</text>
  <text class="edgetxt" x="810" y="102" text-anchor="middle">(public entry)</text>
  <rect class="box" x="690" y="300" width="240" height="48" rx="8"/>
  <text class="lbl" x="810" y="321" text-anchor="middle">Offsite object store</text>
  <text class="edgetxt" x="810" y="338" text-anchor="middle">(backups)</text>
  <rect class="box" x="690" y="470" width="240" height="48" rx="8"/>
  <text class="lbl" x="810" y="491" text-anchor="middle">Alert sink</text>
  <text class="edgetxt" x="810" y="508" text-anchor="middle">(Day-2 events)</text>

  <!-- CLUSTER panel -->
  <rect class="panel" x="20" y="170" width="600" height="430" rx="10"/>
  <text class="title" x="36" y="194">k3s cluster — 3 server nodes, embedded etcd (quorum 3)</text>

  <rect class="box" x="40" y="212" width="260" height="44" rx="8"/>
  <text class="lbl" x="170" y="239" text-anchor="middle">GitOps control loop — ArgoCD</text>
  <rect class="box" x="340" y="212" width="260" height="44" rx="8"/>
  <text class="lbl" x="470" y="234" text-anchor="middle">Ingress &amp; TLS — Traefik +</text>
  <text class="edgetxt" x="470" y="249" text-anchor="middle">cert-manager (DNS-01)</text>

  <rect class="box" x="40" y="282" width="260" height="44" rx="8"/>
  <text class="lbl" x="170" y="309" text-anchor="middle">Storage — Longhorn (V1)</text>
  <rect class="box" x="340" y="282" width="260" height="44" rx="8"/>
  <text class="lbl" x="470" y="309" text-anchor="middle">Secrets — Sealed Secrets</text>

  <rect class="box" x="40" y="352" width="260" height="44" rx="8"/>
  <text class="lbl" x="170" y="374" text-anchor="middle">Backup / DR — CronJobs</text>
  <text class="edgetxt" x="170" y="389" text-anchor="middle">(DB dump / snapshot)</text>

  <rect class="box" x="160" y="500" width="320" height="50" rx="8"/>
  <text class="lbl" x="320" y="522" text-anchor="middle">Workloads</text>
  <text class="edgetxt" x="320" y="539" text-anchor="middle">(stateless to stateful, CRITICAL last)</text>

  <!-- edges into workloads -->
  <path class="edge" d="M170,256 L300,498" marker-end="url(#arrow)"/>
  <path class="edge" d="M170,396 L260,498" marker-end="url(#arrow)"/>
  <path class="edge" d="M470,256 L380,498" marker-end="url(#arrow)"/>
  <path class="edge" d="M470,326 L360,498" marker-end="url(#arrow)"/>

  <!-- cloudflare -> ingress -->
  <path class="edge" d="M690,100 L600,224" marker-end="url(#arrow)"/>
  <text class="edgetxt" x="612" y="150">public entry</text>

  <!-- backup -> offsite store -->
  <path class="edge" d="M300,372 L690,330" marker-end="url(#arrow)"/>

  <!-- workloads -> alert sink (dashed) -->
  <path class="dash" d="M480,520 L690,500" marker-end="url(#arrow)"/>
  <text class="edgetxt" x="520" y="500">metrics / events</text>

  <!-- host hosts the VMs (dashed) -->
  <path class="dash" d="M320,128 L320,170" marker-end="url(#arrow)"/>
  <text class="edgetxt" x="328" y="158">hosts the VMs</text>

  <!-- Plane 0 -> gitops rebuild (dashed) -->
  <path class="dash" d="M170,170 L170,212" marker-end="url(#arrow)"/>
  <text class="edgetxt" x="60" y="160">git-revert / app-of-apps rebuild</text>
</svg>
