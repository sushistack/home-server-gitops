# gluetun VPN credentials — SOPS+age encrypted.
#
# 🔴 THIS IS A PLAINTEXT TEMPLATE. Do NOT commit real values in plaintext.
# Operator workflow (runbook §2–§3):
#   1. put the cluster age recipient in .sops.yaml (age-keygen -y ~/.config/sops/age/keys.txt) — reuse,
#      no new key (DECISIONS.md "zero new keys").
#   2. fill the values below, then encrypt IN PLACE:  sops -e -i ansible/media-stack/secrets.sops.yaml
#   3. commit ONLY the encrypted result. The playbook decrypts at runtime via SOPS_AGE_KEY_FILE=/keys/age/keys.txt.
#
# Keys map 1:1 to gluetun env (docker-compose.yml). WireGuard example shown; adjust per provider/VPN_TYPE.
VPN_SERVICE_PROVIDER: REPLACE_ME      # e.g. mullvad, protonvpn, … (gluetun provider id)
VPN_TYPE: wireguard
WIREGUARD_PRIVATE_KEY: REPLACE_ME
WIREGUARD_ADDRESSES: REPLACE_ME       # e.g. 10.64.0.2/32
SERVER_CITIES: REPLACE_ME             # e.g. Amsterdam
